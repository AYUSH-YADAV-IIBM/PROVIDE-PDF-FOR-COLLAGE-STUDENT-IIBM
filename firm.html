<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#f4f7fb;
}

/* FORM */

.form-box{

    width:90%;

    max-width:700px;

    background:#fff;

    padding:20px;

    border-radius:16px;

    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

/* TITLE */

.form-box h2{

    text-align:center;

    margin-bottom:18px;

    color:#2563eb;

    font-size:22px;
}

/* FORM GRID */

.form-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(120px,1fr));

    gap:12px;
}

/* INPUT */

input{

    width:100%;

    padding:11px;

    border:1px solid #dbe2ea;

    border-radius:10px;

    outline:none;

    font-size:13px;
}

input:focus{

    border-color:#2563eb;
}

/* BUTTON */

button{

    width:100%;

    margin-top:15px;

    padding:12px;

    border:none;

    border-radius:10px;

    background:#2563eb;

    color:white;

    font-weight:600;

    cursor:pointer;
}

button:hover{

    background:#1d4ed8;
}

</style>
</head>

<body>

<div class="form-box">

    <h2>Student Form</h2>

    <form>

        <div class="form-grid">

            <input type="text"
                   placeholder="Name">

            <input type="email"
                   placeholder="Email">

            <input type="number"
                   placeholder="Number">

            <input type="text"
                   placeholder="Class">

            <input type="text"
                   placeholder="Section">

        </div>

        <button>

            Submit

        </button>

    </form>

</div>

</body>
</html>
